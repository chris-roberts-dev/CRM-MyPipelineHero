# MyPipelineHero CI scaffold (I.4.1).
# M0 ships the lint + test jobs only. Migration safety, tenant-isolation,
# capability-coverage, snapshot-replay corpus, and full pricing determinism
# tests come online as their backing code lands in M1+.

name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline-check:
    name: Custom user model baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Run check_user_model_baseline
        run: python scripts/check_user_model_baseline.py

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt
      - name: Install dev requirements
        run: pip install -r requirements/dev.txt
      - name: ruff check
        run: ruff check apps config
      - name: ruff format --check
        run: ruff format --check apps config
      - name: mypy
        run: mypy apps config
        # mypy is non-blocking in M0 while we shake out stubs. Make it blocking
        # by removing this continue-on-error in M1.
        continue-on-error: true

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: mph
          POSTGRES_PASSWORD: mph
          POSTGRES_DB: mph_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U mph"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://mph:mph@localhost:5432/mph_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements/test.txt
      - name: Install test requirements
        run: pip install -r requirements/test.txt
      - name: Django check
        run: python manage.py check
      - name: Migrations apply on a fresh DB
        run: python manage.py migrate --noinput
      - name: makemigrations check
        run: python manage.py makemigrations --check --dry-run
      - name: pytest
        run: pytest -ra