# MyPipelineHero local development reverse proxy.
# Routes mph.local and *.mph.local to the Django web container.
# See docs/guide.md § I.2.2.

events {
    worker_connections 1024;
}

http {
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    server_tokens     off;

    # Allow long subdomain names without warnings.
    server_names_hash_bucket_size 128;

    upstream django {
        server web:8000;
    }

    server {
        listen      80;
        server_name mph.local *.mph.local;

        client_max_body_size 50m;

        location / {
            proxy_pass         http://django;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_redirect     off;
        }

        # Vite dev-server proxy mount — used once the frontend pipeline
        # lands in the next M0 sub-deliverable.
        location /vite/ {
            return 502;
        }
    }
}