# MyPipelineHero local development reverse proxy.
# Routes mph.local and *.mph.local to the Django web container.
# Proxies /vite/ to the Vite dev server with WebSocket upgrade for HMR.
# See docs/guide.md § I.2.2.

events {
    worker_connections 1024;
}

http {
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    server_tokens     off;

    server_names_hash_bucket_size 128;

    # Docker's internal DNS resolver. Required so we can resolve service
    # hostnames per-request (with variables) rather than at startup.
    # Without this, an upstream that's not yet listening at Nginx start
    # would make the whole server fail to start.
    resolver 127.0.0.11 ipv6=off valid=5s;
    resolver_timeout 3s;

    # WebSocket upgrade map for Vite HMR.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen      80;
        server_name mph.local *.mph.local;

        client_max_body_size 50m;

        # Vite dev server — assets + HMR WebSocket.
        #
        # We use a `set $vite_upstream` variable so Nginx re-resolves the
        # `vite` hostname on each request via the resolver above. Without
        # this, Nginx caches the IP at startup; if Vite is down or
        # restarted, requests fail until Nginx itself reloads.
        #
        # The trailing slash on `proxy_pass` strips the /vite/ prefix so
        # the Vite server sees URLs at its root (e.g. /src/entries/...).
        location /vite/ {
            set $vite_upstream "vite:5173";
            proxy_pass         http://$vite_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            # Friendly 503 page when Vite is briefly down or starting up,
            # rather than a generic Nginx 502.
            proxy_intercept_errors on;
            error_page 502 503 504 = @vite_starting;
            # Long timeouts for WebSocket HMR.
            proxy_read_timeout 86400;
        }

        location @vite_starting {
            add_header Content-Type "text/plain; charset=utf-8";
            return 503 "Vite dev server is not reachable. Confirm: (1) frontend/node_modules exists on host (cd frontend && npm install), (2) the vite container is running.\n";
        }

        # Everything else → Django.
        location / {
            set $django_upstream "web:8000";
            proxy_pass         http://$django_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_redirect     off;
        }
    }
}