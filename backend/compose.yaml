# MyPipelineHero — local development stack.
# See docs/guide.md § I.2.1 for the topology.

name: mph

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-replace-me}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-mph.local,*.mph.local,localhost,127.0.0.1,web}
  MPH_ROOT_DOMAIN: ${MPH_ROOT_DOMAIN:-mph.local}
  MPH_TENANT_DOMAIN_TEMPLATE: ${MPH_TENANT_DOMAIN_TEMPLATE:-{slug}.mph.local}
  DATABASE_URL: ${DATABASE_URL:-postgres://mph:mph@postgres:5432/mph}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-mailpit}
  EMAIL_PORT: ${EMAIL_PORT:-1025}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@mph.local}
  OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-http://minio:9000}
  OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY:-mph-dev}
  OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY:-mph-dev-secret}
  OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-mph-dev}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-plain}
  TIME_ZONE: ${TIME_ZONE:-America/Chicago}
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

services:
  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment: *django-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      target: dev
    command: celery -A apps.common.celery worker -Q critical,default,bulk,reports -l info
    volumes:
      - .:/app
    environment: *django-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      target: dev
    command: celery -A apps.common.celery beat -l info --schedule=/tmp/celerybeat-schedule
    volumes:
      - .:/app
    environment: *django-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: mph
      POSTGRES_PASSWORD: mph
      POSTGRES_DB: mph
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mph"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mph-dev
      MINIO_ROOT_PASSWORD: mph-dev-secret
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres-data:
  minio-data: